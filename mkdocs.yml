site_name: WindListen 科技新闻
site_url: https://yanzhg.github.io/windlisten/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  sidebar_width: 25rem

plugins:
  - search:
      lang: zh
      separator: '[\s\-\.，。、]'

nav:
  - 首页: index.md
  - 今日新闻: posts/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yanzhg

extra_css:
  - assets/style.css

# 公式渲染配置
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

# 关键修改：移除 polyfill.io 劫持域名，只保留本地mathjax配置和mathjax官方CDN
extra_javascript:
  - javascripts/mathjax-config.js
  # 删除这一行危险劫持链接：https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js