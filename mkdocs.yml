site_name: WindListen 科技新闻
site_url: https://yanzhg.github.io/windlisten/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  sidebar_width: 25rem

plugins:
  - search:
      lang: zh
      separator: '[\s\-\.，。、]'
  - awesome-pages

# 修正导航：只写目录名posts，插件自动读取.posts配置生成子菜单
nav:
  - 首页: index.md
  - 今日新闻: posts

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yanzhg

extra_css:
  - assets/style.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js