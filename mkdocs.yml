site_name: WindListen 科技新闻
site_description: 每日自动采集互联网科技新闻
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - 首页: index.md
  - 今日新闻:
      - 新闻汇总页: posts/index.md
      - 全部新闻: auto

plugins:
  - search
  - awesome-pages