site_name: WindListen 科技新闻
site_url: https://yanzhg.github.io/windlisten/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换至浅色模式
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  sidebar_width: 25rem

plugins:
  - search:
      lang: zh
      separator: '[\s\-\.，。、]'

# 导航适配新闻结构
nav:
  - 首页: index.md
  - 今日新闻: posts/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yanzhg

# 无自定义css，删掉assets/style.css（windlisten没有这个文件，避免构建警告）
# extra_css:
#   - assets/style.css

# 公式渲染配置完整保留
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax-config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js